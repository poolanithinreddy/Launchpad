services:
  postgres:
    image: postgres:15
    container_name: launchpad-postgres
    environment:
      POSTGRES_DB: launchpad
      POSTGRES_USER: launchpad
      POSTGRES_PASSWORD: launchpad123
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
  redis:
    image: redis:7-alpine
    container_name: launchpad-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
  mongodb:
    image: mongo:7
    container_name: launchpad-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  postgres-data:
  redis-data:
  mongo_data:
